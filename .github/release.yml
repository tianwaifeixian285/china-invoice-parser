changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 新功能
      labels:
        - enhancement
        - feature
    - title: 缺陷修复
      labels:
        - bug
        - fix
    - title: 测试与规范
      labels:
        - test
        - docs
    - title: 构建与基础设施
      labels:
        - build
        - ci
    - title: 其他变更
      labels:
        - "*"

